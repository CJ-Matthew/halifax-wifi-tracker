<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 52" shape-rendering="crispEdges">
  <!-- Ears -->
  <rect x="7"  y="8"  width="9" height="11" fill="#ff922b" stroke="#7a4200" stroke-width="2" />
  <rect x="28" y="8"  width="9" height="11" fill="#ff922b" stroke="#7a4200" stroke-width="2" />
  <rect x="9"  y="10" width="3" height="4"  fill="#ffbf6e" />
  <!-- Body -->
  <rect x="6" y="16" width="32" height="28" rx="3" fill="#ff922b" stroke="#7a4200" stroke-width="2.5" />
  <!-- Highlight -->
  <rect x="10" y="19" width="8" height="5" fill="#ffbf6e" opacity="0.8" />
  <!-- Eyes -->
  <rect x="13" y="25" width="7" height="8" fill="#15151f" />
  <rect x="24" y="25" width="7" height="8" fill="#15151f" />
  <rect x="14" y="26" width="2" height="2" fill="#fff" opacity="0.7" />
  <rect x="25" y="26" width="2" height="2" fill="#fff" opacity="0.7" />
  <!-- Mouth -->
  <rect x="20" y="36" width="4" height="4" fill="#fff" stroke="#7a4200" stroke-width="0.5" />
  <!-- Legs -->
  <rect x="11" y="44" width="9" height="7" rx="1" fill="#ff922b" stroke="#7a4200" stroke-width="2" />
  <rect x="24" y="44" width="9" height="7" rx="1" fill="#ff922b" stroke="#7a4200" stroke-width="2" />
</svg>
